replicaCount: 2

nameOverride: ""
fullnameOverride: "shared-static-sites"

image:
  repository: caddy
  tag: "2.10-alpine"
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

persistence:
  enabled: true
  existingClaim: ""
  storageClassName: local-path
  size: 1Gi

ingress:
  enabled: true
  className: ""
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
  hosts: []
  tls: []

caddy:
  adminAddress: "127.0.0.1:2019"
  allowedHosts: []
  reloadWatcher:
    enabled: true
    pollIntervalSeconds: 2
    resources:
      requests:
        cpu: 5m
        memory: 16Mi
      limits:
        cpu: 25m
        memory: 64Mi
