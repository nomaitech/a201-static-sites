replicaCount: 2

nameOverride: ""
fullnameOverride: "shared-static-sites"

image:
  repository: pdr.jonbesga.com/shared-static-caddy-demo
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: regcred

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

persistence:
  enabled: true
  existingClaim: ""
  storageClassName: local-path
  size: 1Gi

ingress:
  enabled: true
  className: ""
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
  hosts: []
  tls: []

caddy:
  adminAddress: "127.0.0.1:2019"
  allowedHosts: []
  reloadWatcher:
    enabled: true
    pollIntervalSeconds: 2
