apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "shared-static-caddy.fullname" . }}-config
  labels:
    {{- include "shared-static-caddy.labels" . | nindent 4 }}
data:
  Caddyfile: |
    {{- if eq (len .Values.caddy.allowedHosts) 0 }}
    {{- fail "caddy.allowedHosts must contain at least one host (generated from content/caddy-sites by the deploy script)" }}
    {{- end }}
    {
      auto_https off
      admin off
    }

    :80 {
      @allowed host {{ join " " .Values.caddy.allowedHosts }}
      handle @allowed {
        root * /srv/sites
        rewrite * /{host}/current{path}
        file_server
      }

      respond "Not found" 404
    }
