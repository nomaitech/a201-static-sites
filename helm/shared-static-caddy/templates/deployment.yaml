apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shared-static-caddy.fullname" . }}
  labels:
    {{- include "shared-static-caddy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "shared-static-caddy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shared-static-caddy.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: caddy
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: caddy-config
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
              readOnly: true
            - name: site-content
              mountPath: /srv/sites
      volumes:
        - name: caddy-config
          configMap:
            name: {{ include "shared-static-caddy.fullname" . }}-config
        - name: site-content
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-content" (include "shared-static-caddy.fullname" .)) .Values.persistence.existingClaim }}
