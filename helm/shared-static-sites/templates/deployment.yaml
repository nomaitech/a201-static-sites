apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shared-static-sites.fullname" . }}
  labels:
    {{- include "shared-static-sites.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "shared-static-sites.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shared-static-sites.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: Host
                  value: {{ (index (index .Values.sites 0).hosts 0) | quote }}
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/sites.conf
              subPath: sites.conf
              readOnly: true
            - name: site-content
              mountPath: /srv/sites
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "shared-static-sites.fullname" . }}-nginx
        - name: site-content
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-content" (include "shared-static-sites.fullname" .)) .Values.persistence.existingClaim }}

