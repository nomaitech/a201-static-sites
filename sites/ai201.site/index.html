<!doctype html>
<!-- cache test -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ai201.site</title>
  <meta http-equiv="refresh" content="3;url=https://ai201.club" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --neon-green: #00ff41;
      --hot-pink: #ff006e;
      --electric-blue: #3a86ff;
      --bg-dark: #0a0a0f;
      --text-primary: #f0f0f0;
      --text-muted: #8888aa;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, rgba(255, 0, 110, 0.18), transparent 42%),
                  radial-gradient(circle at 80% 80%, rgba(58, 134, 255, 0.2), transparent 46%),
                  var(--bg-dark);
      color: var(--text-primary);
      font-family: "JetBrains Mono", monospace;
      padding: 1.25rem;
      text-align: center;
    }

    main {
      max-width: 44rem;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(18, 18, 26, 0.85);
      box-shadow: 0 0 60px rgba(255, 0, 110, 0.14);
      border-radius: 14px;
      padding: clamp(1.25rem, 4vw, 2rem);
    }

    h1 {
      font-family: "Unbounded", sans-serif;
      font-size: clamp(1.2rem, 4vw, 2rem);
      line-height: 1.25;
      letter-spacing: 0.01em;
    }

    .club {
      color: var(--neon-green);
    }

    p {
      margin-top: 0.95rem;
      color: var(--text-muted);
      font-size: clamp(0.88rem, 2vw, 1rem);
    }

    a {
      color: var(--electric-blue);
      text-underline-offset: 3px;
    }
  </style>
  <script>
    setTimeout(function () {
      window.location.href = "https://ai201.club";
    }, 3000);
  </script>
</head>
<body>
  <main>
    <h1>You are probably looking for <span class="club">ai201.club</span></h1>
    <p>Redirecting in 3 seconds...</p>
    <p><a href="https://ai201.club">Go now</a></p>
  </main>
</body>
</html>
