<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;

  }
  * { box-sizing: border-box; }
  html, body {

  }
  body {
    margin: 0;

  #app {

  #welcomeOverlay {

    display: flex;
    align-items: center;

  #startBtn {

  }
  #gameOverOverlay {
    position: fixed;

  #gameOverCard {
    background: var(--panel);
    border: 1px solid var(--border);

    padding: 32px 28px;
    max-width: 380px;
    width: 100%;
    text-align: center;

  #gameOverCard h1 {

  #shareBtn {

  .stage {
    display: flex;

  }
  .panel {
    background: var(--panel);

  .panel h2 {

  .canvas-stack {
    position: relative;

  }

    position: absolute;

  #controlsBar {
    flex: 0 0 35%;

  }
  #controlsBar h2 {
    flex: 0 0 auto;
    margin: 0 0 10px;

    color: #8b949e;
    font-weight: 600;
    text-transform: uppercase;

  }
  .controls {
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
    flex: 1 1 auto;

    overflow-y: auto;

  .control-row {

  .neuron-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;

    background: #0d1117;
    width: min(340px, 100%);

  .neuron-card h3 {
    margin: 0;

  .neuron-sliders {

  #plotCanvas {
    position: absolute;
    inset: 0;
    display: block;
    width: 100%;
    height: 100%;
  }
  .legend {
    display: flex;
    gap: 20px;
    margin-top: 6px;
    font-size: 0.85rem;
    justify-content: center;
  }
  .legend span {

    align-items: center;

  }
  .swatch {
    width: 18px;

  }
  .fit-bar-bg {
    width: 100%;
    height: 18px;
    background: #21262d;
    border-radius: 9px;

    height: 100%;

  .fit-label {

  #fitPct {
    color: var(--text);
    font-weight: 700;
  }
  button {
    background: #21262d;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 6px;

  }
  button:hover {
    background: #30363d;
  }
  #topBar {
    flex: 0 0 12%;
    padding: 10px 20px 0;
    display: flex;
    flex-direction: column;
  }
  #levelRow {
    flex: 0 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.3px;
    padding-bottom: 4px;
  }
  #elapsedTimer {
    font-variant-numeric: tabular-nums;
  }
  #fitWrap {
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
  }
  #fitProgress {

    inset: 0;

    background: var(--win);
    color: white;
    font-weight: 700;
    padding: 10px;
    border-radius: 8px;
    font-size: 1.05rem;
    visibility: hidden;
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  #topBar.won #winBanner {

  }
  #nextLevelBtn {

    color: var(--win);
    border: none;
    font-weight: 700;
  }

  }

  }
  @media (max-width: 480px) {

</head>
<body>

<div id="welcomeOverlay">
  <div id="welcomeCard">
    <h1>NeuralFit</h1>
    <p>Adjust the network's weights and biases so its output curve matches the target.</p>
    <button id="startBtn">Start</button>
  </div>
</div>

<div id="gameOverOverlay" class="hidden">
  <div id="gameOverCard">
    <h1>⏱️ Time's Up!</h1>
    <p id="gameOverText">You reached Level 1 · Straight Line</p>
    <div class="actions">
      <button id="shareBtn">Share</button>
      <button id="playAgainBtn">Play Again</button>
    </div>
  </div>
</div>

<div id="app">
  <div id="topBar">
    <div id="levelRow">
      <span id="levelBarTop">Level 1 · Straight Line</span>
      <span id="elapsedTimer">0:00</span>
    </div>
    <div id="fitWrap">
      <div id="fitProgress">
        <div class="fit-bar-bg"><div class="fit-bar-fill" id="fitBar"></div></div>
        <div class="fit-label"><span>Fit</span><span id="fitPct">0%</span></div>
      </div>
      <div id="winBanner">
        <span id="winText">🎉 Fit achieved! 90% match.</span>
        <button id="nextLevelBtn">Next Level</button>
        <button id="winShareBtn">Share</button>
      </div>
    </div>
  </div>

  <div id="scrollArea">
    <div class="stage">
      <div class="panel" id="visPanel">
        <h2>Target vs. Output</h2>
        <div class="canvas-stack">
          <canvas id="netCanvas" width="320" height="240"></canvas>
          <canvas id="plotCanvas" width="420" height="420"></canvas>
        </div>
        <div class="legend">
          <span><i class="swatch" style="background:var(--target)"></i> Target curve</span>
          <span><i class="swatch" style="background:var(--perc)"></i> Perceptron output</span>
        </div>
      </div>
    </div>
  </div>

  <div id="controlsBar">
    <h2>Controls</h2>
    <div class="controls" id="controls"></div>
  </div>
</div>

<script>
(function () {
  const netCanvas = document.getElementById('netCanvas');
  const netCtx = netCanvas.getContext('2d');
  const plotCanvas = document.getElementById('plotCanvas');
  const plotCtx = plotCanvas.getContext('2d');
  const controlsEl = document.getElementById('controls');
  const fitBar = document.getElementById('fitBar');
  const fitPctEl = document.getElementById('fitPct');
  const topBar = document.getElementById('topBar');
  const nextLevelBtn = document.getElementById('nextLevelBtn');
  const winShareBtn = document.getElementById('winShareBtn');
  const levelBarTop = document.getElementById('levelBarTop');
  const elapsedTimerEl = document.getElementById('elapsedTimer');
  const AXIS_RANGE = 10; // plot spans -10..10 on both axes
  const WIN_THRESHOLD = 0.90;
  const MAX_HIDDEN = 6; // cap neuron count so the control panel stays usable

  let level = 1;
  let cfg, target, model, hasWon;

  const LEVEL_NAMES = [
    'Straight Shooter',
    'First Bend',
    'Double Trouble',
    'Zigzag Zone',
    'Wavy Gravy',
    'Serpentine Storm',
    'Chaos Curve',
    'Neural Nightmare',
    'Overfit Overdrive',
    'Gradient Gauntlet'
  ];

  function levelConfig(lvl) {
    const kinks = lvl - 1;
    const hidden = kinks === 0 ? 0 : Math.min(kinks + 1, MAX_HIDDEN);
    const name = kinks < LEVEL_NAMES.length ? LEVEL_NAMES[kinks] : ('Curveball ' + (kinks + 1));
    return { level: lvl, kinks, hidden, name };
  }

  // Target is a piecewise-linear function through random breakpoints across the domain.
  function generateTarget(kinks) {
    const xs = [-AXIS_RANGE];
    if (kinks > 0) {
      const interior = [];
      for (let i = 0; i < kinks; i++) {
        const base = -AXIS_RANGE + (2 * AXIS_RANGE * (i + 1)) / (kinks + 1);
        interior.push(Math.max(-AXIS_RANGE + 0.5, Math.min(AXIS_RANGE - 0.5, base + (Math.random() * 2 - 1))));
      }
      interior.sort((a, b) => a - b);
      xs.push(...interior);
    }
    xs.push(AXIS_RANGE);
    return xs.map(x => ({ x, y: Math.random() * 16 - 8 }));
  }

  function targetY(x) {
    for (let i = 0; i < target.length - 1; i++) {
      const a = target[i], b = target[i + 1];
      if (x >= a.x && x <= b.x) {
        const t = (x - a.x) / (b.x - a.x);
        return a.y + t * (b.y - a.y);
      }
    }
    return target[target.length - 1].y;
  }

  // Model: linear neuron (hidden === 0) -> y = w*x + b
  // Or a 1-hidden-layer ReLU network -> y = sum(v_i * ReLU(w_i*x + b_i)) + outBias
  function defaultModel(hidden) {
    if (hidden === 0) return { hidden: 0, w: 1, b: 0 };
    const neurons = [];
    for (let i = 0; i < hidden; i++) {
      const bx = -AXIS_RANGE + (2 * AXIS_RANGE * (i + 1)) / (hidden + 1);
      neurons.push({ w: 1, b: -bx, v: 0 });
    }
    return { hidden, neurons, outBias: 0 };
  }

  function predict(x) {
    if (model.hidden === 0) return model.w * x + model.b;
    let sum = model.outBias;
    for (const n of model.neurons) sum += n.v * Math.max(0, n.w * x + n.b);
    return sum;
  }

  // R^2 (coefficient of determination): scale-invariant, so it correctly
  // penalizes a flat/straight prediction against a curve with real variation
  // instead of comparing raw error to a fixed axis-range constant.
  function computeFit() {
    const samples = 100;
    const n = samples + 1;
    const targetVals = new Array(n);
    const predVals = new Array(n);
    for (let i = 0; i < n; i++) {
      const x = -AXIS_RANGE + (2 * AXIS_RANGE * i) / samples;
      targetVals[i] = targetY(x);
      predVals[i] = predict(x);
    }
    const meanTarget = targetVals.reduce((a, b) => a + b, 0) / n;
    let ssRes = 0, ssTot = 0;
    for (let i = 0; i < n; i++) {
      ssRes += (targetVals[i] - predVals[i]) ** 2;
      ssTot += (targetVals[i] - meanTarget) ** 2;
    }
    if (ssTot < 1e-6) {
      // near-flat target: fall back to absolute error so we don't divide by ~0
      let totalErr = 0;
      for (let i = 0; i < n; i++) totalErr += Math.abs(targetVals[i] - predVals[i]);
      return Math.max(0, Math.min(1, 1 - (totalErr / n) / (2 * AXIS_RANGE)));
    }
    return Math.max(0, Math.min(1, 1 - ssRes / ssTot));
  }

  function buildControls() {
    controlsEl.innerHTML = '';

    function addSlider(container, label, min, max, value, onInput) {
      const row = document.createElement('div');
      row.className = 'control-row';
      const lab = document.createElement('label');
      const span = document.createElement('span');
      span.className = 'val';
      span.textContent = value.toFixed(2);
      lab.textContent = label + ' ';
      lab.appendChild(span);
      const input = document.createElement('input');
      input.type = 'range';
      input.min = min; input.max = max; input.step = 0.01; input.value = value;
      input.addEventListener('input', () => {
        const v = parseFloat(input.value);
        span.textContent = v.toFixed(2);
        onInput(v);
        update();
      });
      row.appendChild(lab);
      row.appendChild(input);
      container.appendChild(row);
    }

    if (model.hidden === 0) {
      addSlider(controlsEl, 'Weight w', -5, 5, model.w, v => model.w = v);
      addSlider(controlsEl, 'Bias b', -10, 10, model.b, v => model.b = v);
    } else {
      model.neurons.forEach((n, i) => {
        const card = document.createElement('div');
        card.className = 'neuron-card';
        const h3 = document.createElement('h3');
        h3.textContent = 'Neuron ' + (i + 1) + ' (ReLU)';
        card.appendChild(h3);
        const slidersRow = document.createElement('div');
        slidersRow.className = 'neuron-sliders';
        addSlider(slidersRow, 'Input weight w', -5, 5, n.w, v => n.w = v);
        addSlider(slidersRow, 'Bias b', -10, 10, n.b, v => n.b = v);
        addSlider(slidersRow, 'Output weight v', -6, 6, n.v, v => n.v = v);
        card.appendChild(slidersRow);
        controlsEl.appendChild(card);
      });
      const outputCard = document.createElement('div');
      outputCard.className = 'neuron-card';
      const outputH3 = document.createElement('h3');
      outputH3.textContent = 'Output';
      outputCard.appendChild(outputH3);
      const outputRow = document.createElement('div');
      outputRow.className = 'neuron-sliders';
      addSlider(outputRow, 'Output bias', -10, 10, model.outBias, v => model.outBias = v);
      outputCard.appendChild(outputRow);
      controlsEl.appendChild(outputCard);
    }
  }

  function weightedLine(ctx, x1, y1, x2, y2, weight, label) {
    const w = Math.max(0.5, Math.min(5, Math.abs(weight)));
    ctx.beginPath();
    ctx.strokeStyle = weight >= 0 ? '#3fb950' : '#f85149';
    ctx.lineWidth = w;
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    if (label) {
      const midX = (x1 + x2) / 2, midY = (y1 + y2) / 2;
      ctx.fillStyle = '#c9d1d9';
      ctx.font = '11px sans-serif';
      ctx.fillText(label + '=' + weight.toFixed(2), midX - 18, midY - 6);
    }
  }

  function node(ctx, x, y, label, fill, sub) {
    ctx.beginPath();
    ctx.arc(x, y, 20, 0, Math.PI * 2);
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.strokeStyle = '#30363d';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#0d1117';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, x, y);
    if (sub) {
      ctx.fillStyle = '#8b949e';
      ctx.font = '10px sans-serif';
      ctx.fillText(sub, x, y + 32);
    }
    ctx.textAlign = 'start';
    ctx.textBaseline = 'alphabetic';
  }

  function drawNetwork() {
    let W, H;
    if (model.hidden === 0) {
      W = 320; H = 240;
    } else {
      W = 360;
      H = Math.max(220, 100 + (model.hidden - 1) * 60) + 40;
    }
    netCanvas.width = W; netCanvas.height = H;
    const ctx = netCtx;
    ctx.clearRect(0, 0, W, H);

    if (model.hidden === 0) {
      const inX = 70, outX = W - 70;
      const xY = 70, biasY = H - 70, outY = H / 2;
      weightedLine(ctx, inX, xY, outX, outY, model.w, 'w');
      weightedLine(ctx, inX, biasY, outX, outY, model.b, 'b');
      node(ctx, inX, xY, 'x', '#58a6ff');
      node(ctx, inX, biasY, '1', '#d29922');
      node(ctx, outX, outY, 'y', '#3fb950');
      ctx.fillStyle = '#8b949e';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText('output = w·x + b', W - 8, H - 10);
      ctx.textAlign = 'start';
    } else {
      const n = model.hidden;
      const inX = 55, hidX = W / 2, outX = W - 55;
      const inY = H / 2, outY = H / 2;
      const topMargin = 50, bottomMargin = 50;
      const spacing = (H - topMargin - bottomMargin) / (n - 1);
      const hidYs = [];
      for (let i = 0; i < n; i++) hidYs.push(topMargin + i * spacing);
      const showLabels = n <= 4;
      const biasX = outX, biasY = H - 65;

      for (let i = 0; i < n; i++) weightedLine(ctx, inX, inY, hidX, hidYs[i], model.neurons[i].w, showLabels ? ('w' + (i + 1)) : null);
      for (let i = 0; i < n; i++) weightedLine(ctx, hidX, hidYs[i], outX, outY, model.neurons[i].v, showLabels ? ('v' + (i + 1)) : null);
      weightedLine(ctx, biasX, biasY, outX, outY, model.outBias, 'b');

      node(ctx, inX, inY, 'x', '#58a6ff');
      for (let i = 0; i < n; i++) node(ctx, hidX, hidYs[i], 'h' + (i + 1), '#3fb950', 'ReLU');
      node(ctx, biasX, biasY, '1', '#d29922');
      node(ctx, outX, outY, 'y', '#a371f7');

      ctx.fillStyle = '#8b949e';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText('y = vᵀ·ReLU(w·x + b) + c', W - 8, H - 10);
      ctx.textAlign = 'start';

      if (!showLabels) {
        ctx.font = '10px sans-serif';
        ctx.fillText('exact values shown in controls →', 10, H - 6);
      }
    }
  }

  function toScreen(x, y, W, H) {
    const sx = W / 2 + (x / AXIS_RANGE) * (W / 2 - 20);
    const sy = H / 2 - (y / AXIS_RANGE) * (H / 2 - 20);
    return [sx, sy];
  }

  function drawCurve(ctx, W, H, fn, color) {
    const N = 100;
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    for (let i = 0; i <= N; i++) {
      const x = -AXIS_RANGE + (2 * AXIS_RANGE * i) / N;
      const [sx, sy] = toScreen(x, fn(x), W, H);
      if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
    }
    ctx.stroke();
  }

  function drawPlot() {
    const ctx = plotCtx;
    const W = plotCanvas.width, H = plotCanvas.height;
    ctx.clearRect(0, 0, W, H);

    ctx.strokeStyle = '#21262d';
    ctx.lineWidth = 1;
    for (let g = -AXIS_RANGE; g <= AXIS_RANGE; g += 2) {
      const [gx] = toScreen(g, 0, W, H);
      const [, gy] = toScreen(0, g, W, H);
      ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
    }

    ctx.strokeStyle = '#484f58';
    ctx.lineWidth = 2;
    const [zx, zy] = toScreen(0, 0, W, H);
    ctx.beginPath(); ctx.moveTo(zx, 0); ctx.lineTo(zx, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, zy); ctx.lineTo(W, zy); ctx.stroke();

    drawCurve(ctx, W, H, targetY, getComputedStyle(document.documentElement).getPropertyValue('--target').trim());
    drawCurve(ctx, W, H, predict, getComputedStyle(document.documentElement).getPropertyValue('--perc').trim());
  }

  function update() {
    drawNetwork();
    drawPlot();

    const fit = computeFit();
    const pct = Math.round(fit * 100);
    fitBar.style.width = pct + '%';
    fitPctEl.textContent = pct + '%';

    const winPct = Math.round(WIN_THRESHOLD * 100);
    if (pct >= winPct && !hasWon) {
      hasWon = true;
      topBar.classList.add('won');
    } else if (pct < winPct && hasWon) {
      hasWon = false;
      topBar.classList.remove('won');
    }
  }

  function startLevel(lvl) {
    level = lvl;
    cfg = levelConfig(level);
    model = defaultModel(cfg.hidden);
    let attempts = 0;
    do {
      target = generateTarget(cfg.kinks);
      attempts++;
    } while (Math.round(computeFit() * 100) >= Math.round(WIN_THRESHOLD * 100) && attempts < 50);
    hasWon = false;
    topBar.classList.remove('won');
    levelBarTop.textContent = 'Level ' + level + ' · ' + cfg.name;
    buildControls();
    update();
  }

  nextLevelBtn.addEventListener('click', () => {
    startLevel(level + 1);
  });

  let elapsedSeconds = 0;
  let elapsedTimerId = null;

  function formatElapsed(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m + ':' + String(sec).padStart(2, '0');
  }

  function startElapsedTimer() {
    clearInterval(elapsedTimerId);
    elapsedSeconds = 0;
    elapsedTimerEl.textContent = formatElapsed(0);
    elapsedTimerId = setInterval(() => {
      elapsedSeconds++;
      elapsedTimerEl.textContent = formatElapsed(elapsedSeconds);
    }, 1000);
  }

  const welcomeOverlay = document.getElementById('welcomeOverlay');
  const startBtn = document.getElementById('startBtn');
  const gameOverOverlay = document.getElementById('gameOverOverlay');
  const gameOverText = document.getElementById('gameOverText');
  const shareBtn = document.getElementById('shareBtn');
  const playAgainBtn = document.getElementById('playAgainBtn');

  function endGame() {
    clearInterval(elapsedTimerId);
    gameOverText.textContent = 'You reached Level ' + level + ' · ' + cfg.name + ' in ' + formatElapsed(elapsedSeconds);
    gameOverOverlay.classList.remove('hidden');
  }

  startBtn.addEventListener('click', () => {
    welcomeOverlay.classList.add('hidden');
    startElapsedTimer();
  });

  playAgainBtn.addEventListener('click', () => {
    gameOverOverlay.classList.add('hidden');
    startLevel(1);
    startElapsedTimer();
  });

  async function shareScore(btn) {
    const shareData = {
      title: 'NeuralFit',
      text: 'I reached Level ' + level + ' · ' + cfg.name + ' in ' + formatElapsed(elapsedSeconds) + ' playing NeuralFit! Can you beat me?',
      url: location.href
    };
    const fullText = shareData.text + ' ' + shareData.url;

    if (navigator.share) {
      try {
        await navigator.share(shareData);
        return;
      } catch (e) {
        return; // user cancelled the native share sheet
      }
    }

    if (window.isSecureContext && navigator.clipboard) {
      try {
        await navigator.clipboard.writeText(fullText);
        const original = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = original; }, 1500);
        return;
      } catch (e) {
        // fall through to prompt below
      }
    }

    window.prompt('Copy your score:', fullText);
  }

  winShareBtn.addEventListener('click', () => shareScore(winShareBtn));
  shareBtn.addEventListener('click', () => shareScore(shareBtn));

  startLevel(1);
})();
</script>
</body>
</html>
