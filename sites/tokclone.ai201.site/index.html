<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>FakeTok</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Top bar -->
  <header class="topbar">
    <button class="icon-btn live-btn" aria-label="Live">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Zm0 15a5 5 0 1 1 5-5 5 5 0 0 1-5 5Z"/></svg>
    </button>
    <nav class="feed-tabs">
      <button class="feed-tab" data-tab="following">Following</button>
      <button class="feed-tab is-active" data-tab="foryou">For You</button>
    </nav>
    <button class="icon-btn search-btn" aria-label="Search">
      <svg viewBox="0 0 24 24"><path d="M10 2a8 8 0 1 0 4.9 14.32l5.39 5.38 1.41-1.41-5.38-5.39A8 8 0 0 0 10 2Zm0 2a6 6 0 1 1-6 6 6 6 0 0 1 6-6Z"/></svg>
    </button>
  </header>

  <!-- Video feed -->
  <main id="feed" class="feed"></main>

  <!-- Comments drawer -->
  <div id="commentsSheet" class="sheet-backdrop">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <span id="commentCount">0 comments</span>
        <button class="sheet-close" id="closeComments" aria-label="Close">&times;</button>
      </div>
      <div class="sheet-body" id="commentList"></div>
      <div class="sheet-input">
        <div class="mini-avatar"></div>
        <input type="text" placeholder="Add comment..." id="commentInput">
        <button class="send-btn" aria-label="Send">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Share sheet -->
  <div id="shareSheet" class="sheet-backdrop">
    <div class="sheet share-sheet">
      <div class="sheet-handle"></div>
      <div class="share-grid" id="shareGrid"></div>
      <button class="share-cancel" id="closeShare">Cancel</button>
    </div>
  </div>

  <!-- Bottom nav -->
  <nav class="bottombar">
    <button class="nav-item is-active" data-nav="home">
      <svg viewBox="0 0 24 24"><path d="M12 2 1 12h3v9h6v-6h4v6h6v-9h3z"/></svg>
      <span>Home</span>
    </button>
    <button class="nav-item" data-nav="friends">
      <svg viewBox="0 0 24 24"><path d="M8 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm8 0a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm-8 2c-3.3 0-8 1.7-8 5v3h10v-3c0-1.4.6-2.6 1.5-3.6C10.6 13.2 9.3 13 8 13Zm8 0c-.4 0-.9 0-1.4.1A6 6 0 0 1 18 18v3h6v-3c0-3.3-4.7-5-8-5Z"/></svg>
      <span>Friends</span>
    </button>
    <button class="nav-item add-item" data-nav="add" aria-label="Create">
      <span class="add-icon"><svg viewBox="0 0 24 24"><path d="M19 13H13v6h-2v-6H5v-2h6V5h2v6h6z"/></svg></span>
    </button>
    <button class="nav-item" data-nav="inbox">
      <svg viewBox="0 0 24 24"><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Zm0 2v.4l8 5 8-5V6Zm16 12V8.6l-8 5-8-5V18Z"/></svg>
      <span>Inbox</span>
      <span class="badge">7</span>
    </button>
    <button class="nav-item" data-nav="profile">
      <span class="nav-avatar"></span>
      <span>Profile</span>
    </button>
  </nav>

</div>

<script src="app.js"></script>
</body>
</html>
