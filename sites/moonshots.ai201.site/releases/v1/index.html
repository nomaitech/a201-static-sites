    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-hover: #1a1a26;
      --surface-active: #1e1e2e;
      --border: #2a2a3a;
      --border-active: #4a4a6a;
      --text: #e4e4ef;
      --text-dim: #8888a0;
      --text-muted: #55556a;
      --accent: #7c6aff;
      --accent-glow: #7c6aff40;
      --accent-dim: #6355d0;
      --success: #34d399;
      --warning: #fbbf24;
      --plan-bg: #0e0e16;
    }

    html { font-size: 16px; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
      background: var(--surface);
    }

    header .logo {
      width: 2rem;
      height: 2rem;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header h1 span {
      color: var(--text-dim);
      font-weight: 400;
      margin-left: 0.5rem;
      font-size: 0.85rem;
    }

    /* ── Main Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 380px;
      min-width: 380px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--surface);
    }

    .sidebar-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-header h2 {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }

    .sidebar-header .count {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .moonshot-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }

    .moonshot-list::-webkit-scrollbar { width: 6px; }
    .moonshot-list::-webkit-scrollbar-track { background: transparent; }
    .moonshot-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .moonshot-item {
      padding: 1rem 1.1rem;
      border-radius: 0.6rem;
      cursor: pointer;
      transition: all 0.15s ease;
      border: 1px solid transparent;
      margin-bottom: 2px;
    }

    .moonshot-item:hover {
      background: var(--surface-hover);
    }

    .moonshot-item.active {
      background: var(--surface-active);
      border-color: var(--border-active);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .moonshot-item .icon {
      font-size: 1.3rem;
      margin-bottom: 0.4rem;
      display: block;
    }

    .moonshot-item .title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      letter-spacing: -0.01em;
    }

    .moonshot-item.active .title {
      color: #a78bfa;
    }

    .moonshot-item .subtitle {
      font-size: 0.78rem;
      color: var(--text-dim);
      line-height: 1.4;
    }

    .moonshot-item .tags {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.65rem;
      font-weight: 500;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.02em;
    }

    .tag.timeline { background: #1e293b; color: #93c5fd; }
    .tag.difficulty { background: #1c1917; color: #fbbf24; }
    .tag.category { background: #14231a; color: #6ee7b7; }

    /* ── Plan Panel ── */
    .plan-panel {
      flex: 1;
      overflow-y: auto;
      background: var(--plan-bg);
      padding: 2.5rem 3rem;
    }

    .plan-panel::-webkit-scrollbar { width: 6px; }
    .plan-panel::-webkit-scrollbar-track { background: transparent; }
    .plan-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .plan-empty {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 0.75rem;
    }

    .plan-empty .arrow {
      font-size: 2.5rem;
      opacity: 0.3;
    }

    .plan-empty p {
      font-size: 0.9rem;
    }

    /* Plan content */
    .plan-header {
      margin-bottom: 2.5rem;
      animation: fadeIn 0.3s ease;
    }

    .plan-header .icon-large {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      display: block;
    }

    .plan-header h2 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }

    .plan-header .description {
      font-size: 0.95rem;
      color: var(--text-dim);
      line-height: 1.6;
      max-width: 640px;
    }

    .plan-phases {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .phase {
      animation: slideUp 0.35s ease both;
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      background: var(--surface);
      overflow: hidden;
    }

    .phase:nth-child(1) { animation-delay: 0.05s; }
    .phase:nth-child(2) { animation-delay: 0.1s; }
    .phase:nth-child(3) { animation-delay: 0.15s; }
    .phase:nth-child(4) { animation-delay: 0.2s; }
    .phase:nth-child(5) { animation-delay: 0.25s; }

    .phase-head {
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface-hover);
    }

    .phase-number {
      width: 1.75rem;
      height: 1.75rem;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }

    .phase-title {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .phase-timeline {
      margin-left: auto;
      font-size: 0.7rem;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      padding: 0.2rem 0.6rem;
      border-radius: 9999px;
    }

    .phase-body {
      padding: 1rem 1.25rem;
    }

    .step-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .step-list li {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--text);
    }

    .step-list li::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--accent-dim);
      border-radius: 50%;
      margin-top: 0.45rem;
      flex-shrink: 0;
    }

    .step-list li .detail {
      color: var(--text-dim);
      font-size: 0.78rem;
      display: block;
      margin-top: 0.15rem;
    }

    /* ── Animations ── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .layout { flex-direction: column; }
      .sidebar {
        width: 100%;
        min-width: 100%;
        max-height: 40vh;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .plan-panel { padding: 1.5rem; }
    }
  </style>
</head>

    countEl.textContent = moonshots.length + ' goals';

    let activeId = null;

    function renderList() {
      listEl.innerHTML = moonshots.map(m => `
        <div class="moonshot-item ${m.id === activeId ? 'active' : ''}" data-id="${m.id}">
          <span class="icon">${m.icon}</span>
          <div class="title">${m.title}</div>
          <div class="subtitle">${m.subtitle}</div>
          <div class="tags">
            ${m.tags.map(t => `<span class="tag ${t.type}">${t.label}</span>`).join('')}
          </div>
        </div>
      `).join('');

      listEl.querySelectorAll('.moonshot-item').forEach(el => {
        el.addEventListener('click', () => {
          activeId = el.dataset.id;
          renderList();
          renderPlan(moonshots.find(m => m.id === activeId));
        });
      });
    }

    function renderPlan(m) {
      panelEl.innerHTML = `
        <div class="plan-header">
          <span class="icon-large">${m.icon}</span>
          <h2>${m.title}</h2>
          <p class="description">${m.description}</p>
        </div>
        <div class="plan-phases">
          ${m.phases.map((p, i) => `
            <div class="phase">
              <div class="phase-head">
                <div class="phase-number">${i + 1}</div>
                <div class="phase-title">${p.title}</div>
                <div class="phase-timeline">${p.timeline}</div>
              </div>
              <div class="phase-body">
                <ul class="step-list">
                  ${p.steps.map(s => `
                    <li>
                      <span>
                        ${s.text}
                        <span class="detail">${s.detail}</span>
                      </span>
                    </li>
                  `).join('')}
                </ul>
              </div>
            </div>
          `).join('')}
        </div>
      `;
      panelEl.scrollTop = 0;
    }
