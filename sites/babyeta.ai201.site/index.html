<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baby ETA Countdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-1: #fff8ee;
        --bg-2: #ffe1be;
        --ink: #2d1f13;
        --ink-soft: #6d5644;
        --accent: #ff6a1a;
        --accent-2: #ff8c42;
        --card: rgba(255, 255, 255, 0.55);
        --ring: rgba(255, 106, 26, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family: "DM Sans", sans-serif;
        background:
          radial-gradient(1100px 700px at 8% 10%, rgba(255, 255, 255, 0.8), transparent 55%),
          radial-gradient(1000px 700px at 95% 15%, rgba(255, 140, 66, 0.2), transparent 50%),
          linear-gradient(130deg, var(--bg-1), var(--bg-2));
        overflow-x: hidden;
      }

      .grain {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.16;
        background-image: radial-gradient(circle, #000 0.4px, transparent 0.6px);
        background-size: 3px 3px;
        mix-blend-mode: soft-light;
      }

      .wrap {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 2rem 1rem;
      }

      .panel {
        width: min(980px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 28px;
        background: var(--card);
        backdrop-filter: blur(10px);
        box-shadow:
          0 24px 80px rgba(109, 86, 68, 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.8);
        padding: clamp(1.2rem, 4vw, 2.4rem);
        position: relative;
        overflow: hidden;
      }

      .panel::before {
        content: "";
        position: absolute;
        right: -130px;
        top: -130px;
        width: 280px;
        aspect-ratio: 1;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #ffd7ad, #ff9f5a 65%, #ff7c2f);
        filter: blur(8px);
        opacity: 0.55;
      }

      .label {
        display: inline-block;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--ink-soft);
        padding: 0.35rem 0.6rem;
        border-radius: 999px;
        border: 1px solid rgba(109, 86, 68, 0.2);
        background: rgba(255, 255, 255, 0.65);
      }

      h1 {
        margin: 0.7rem 0 0.2rem;
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(2.5rem, 10vw, 6.4rem);
        line-height: 0.95;
        letter-spacing: 0.03em;
      }

      .subtitle {
        margin: 0;
        color: var(--ink-soft);
        font-size: clamp(0.95rem, 2.7vw, 1.15rem);
      }

      .count {
        margin-top: 1.4rem;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.8rem;
      }

      .tile {
        border-radius: 18px;
        padding: 1rem 0.6rem;
        text-align: center;
        border: 1px solid var(--ring);
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 10px 20px rgba(255, 106, 26, 0.09);
      }

      .num {
        display: block;
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(2.1rem, 7.5vw, 4rem);
        line-height: 0.85;
        letter-spacing: 0.05em;
      }

      .unit {
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-soft);
      }

      .meta {
        margin-top: 1rem;
        color: var(--ink-soft);
        font-size: 0.92rem;
      }

      .done {
        margin-top: 1.2rem;
        font-size: clamp(1.6rem, 6vw, 3rem);
        font-family: "Bebas Neue", sans-serif;
        color: var(--accent);
        letter-spacing: 0.05em;
        display: none;
      }

      .pulse {
        animation: pulse 1.2s infinite ease-in-out;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.06);
          opacity: 0.75;
        }
      }

      @media (max-width: 720px) {
        .count {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div class="grain"></div>
    <main class="wrap">
      <section class="panel" aria-live="polite">
        <span class="label">Baby ETA</span>
        <h1>COUNTDOWN TO BABY</h1>

        <div class="count" id="countdown">
          <article class="tile"><span class="num" id="days">0</span><span class="unit">Days</span></article>
          <article class="tile"><span class="num" id="hours">0</span><span class="unit">Hours</span></article>
          <article class="tile"><span class="num" id="minutes">0</span><span class="unit">Minutes</span></article>
          <article class="tile"><span class="num" id="seconds">0</span><span class="unit">Seconds</span></article>
        </div>

        <p class="meta" id="meta"></p>
        <p class="done pulse" id="done">Baby ETA reached</p>
      </section>
    </main>

    <script>
      const START_AT_8_WEEKS_UTC = new Date("2025-12-15T00:00:00Z");
      const STANDARD_PREGNANCY_WEEKS = 40;
      const START_WEEK = 8;
      const MS_PER_WEEK = 7 * 24 * 60 * 60 * 1000;
      const dueDate = new Date(
        START_AT_8_WEEKS_UTC.getTime() + (STANDARD_PREGNANCY_WEEKS - START_WEEK) * MS_PER_WEEK,
      );

      const els = {
        days: document.getElementById("days"),
        hours: document.getElementById("hours"),
        minutes: document.getElementById("minutes"),
        seconds: document.getElementById("seconds"),
        meta: document.getElementById("meta"),
        done: document.getElementById("done"),
        countdown: document.getElementById("countdown"),
      };

      const pad = (n) => String(n).padStart(2, "0");

      function updateCountdown() {
        const now = new Date();
        const diff = dueDate.getTime() - now.getTime();

        if (diff <= 0) {
          els.days.textContent = "00";
          els.hours.textContent = "00";
          els.minutes.textContent = "00";
          els.seconds.textContent = "00";
          els.countdown.style.opacity = 0.4;
          els.done.style.display = "block";
          els.meta.textContent = `Due date was ${dueDate.toLocaleString()} (${dueDate.toUTCString()})`;
          return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        els.days.textContent = String(days);
        els.hours.textContent = pad(hours);
        els.minutes.textContent = pad(minutes);
        els.seconds.textContent = pad(seconds);

        els.meta.textContent = `Due date: ${dueDate.toLocaleString()}`;
      }

      updateCountdown();
      setInterval(updateCountdown, 1000);
    </script>
  </body>
</html>
