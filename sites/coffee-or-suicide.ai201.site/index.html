<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee or ...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #f8f2e7;
        --ink: #101010;
        --accent: #b54a3a;
        --muted: #544f47;
        --card: #fffdf8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 14% 12%, #ffffffaa 0%, transparent 38%),
          radial-gradient(circle at 86% 90%, #e3d5bf 0%, transparent 33%),
          var(--paper);
        color: var(--ink);
        padding: 24px;
      }

      .card {
        width: min(760px, 100%);
        border: 2px solid var(--ink);
        background: var(--card);
        box-shadow: 7px 7px 0 var(--ink);
        padding: clamp(20px, 5vw, 42px);
        transform: rotate(-0.45deg);
        animation: settle 700ms ease-out;
      }

      .quote {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(1.6rem, 4.2vw, 3rem);
        line-height: 1.05;
        margin: 0;
        letter-spacing: 0.2px;
      }

      .sub {
        margin-top: 16px;
        font-family: "IBM Plex Mono", monospace;
        color: var(--muted);
        font-size: 0.88rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .buttons {
        margin-top: 28px;
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      button {
        appearance: none;
        border: 2px solid var(--ink);
        border-radius: 0;
        background: #fff;
        color: var(--ink);
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 14px 12px;
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
        box-shadow: 4px 4px 0 var(--ink);
      }

      button:hover {
        transform: translate(-1px, -1px);
        box-shadow: 6px 6px 0 var(--ink);
      }

      button:active {
        transform: translate(2px, 2px);
        box-shadow: 0 0 0 var(--ink);
      }

      .coffee {
        background: #f2e4ca;
      }

      .void {
        background: #ffe6e0;
        border-color: var(--accent);
        color: #6d271d;
      }

      .result {
        margin-top: 18px;
        min-height: 46px;
        border-top: 1px dashed #918779;
        padding-top: 12px;
        font-family: "IBM Plex Mono", monospace;
        line-height: 1.5;
      }

      .result strong {
        color: var(--accent);
      }

      @keyframes settle {
        from {
          opacity: 0;
          transform: translateY(16px) rotate(-1.2deg);
        }
        to {
          opacity: 1;
          transform: translateY(0) rotate(-0.45deg);
        }
      }

      @media (max-width: 640px) {
        .buttons {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1 class="quote">
        Should I kill myself,<br />or have a cup of coffee?
      </h1>
      <p class="sub">An absurdist decision engine, inspired by Camus.</p>

      <section class="buttons" aria-label="Absurdist choices">
        <button class="coffee" id="coffeeBtn">Drink Coffee</button>
        <button class="void" id="voidBtn">Kill Myself</button>
      </section>

      <p class="result" id="result">The universe is silent. Choose anyway.</p>
    </main>

    <script>
      const result = document.getElementById("result");
      const coffeeBtn = document.getElementById("coffeeBtn");
      const voidBtn = document.getElementById("voidBtn");

      const coffeeResponses = [
        "<strong>Excellent.</strong> One more cup, one more revolt against meaninglessness.",
        "<strong>You chose coffee.</strong> The day remains absurd, but aromatic.",
        "<strong>Cup acquired.</strong> Existence is still weird. Continue anyway.",
      ];

      const voidResponses = [
        "<strong>Rejected.</strong> The kettle votes no. Try coffee first.",
        "<strong>System error:</strong> absurdism recommends staying for another cup.",
        "<strong>Hard pass.</strong> If this feels personal, call or text <strong>988</strong> now.",
      ];

      function pick(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }

      coffeeBtn.addEventListener("click", () => {
        result.innerHTML = pick(coffeeResponses);
      });

      voidBtn.addEventListener("click", () => {
        result.innerHTML = pick(voidResponses);
      });
    </script>
  </body>
</html>
